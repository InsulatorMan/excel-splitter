name: Build Tauri Excel Splitter

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: stable
    
    - name: Install Tauri CLI
      run: cargo install tauri-cli
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build Tauri App
      run: cargo tauri build
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: excel-splitter-windows-exe
        path: target/release/excel-splitter.exe
    
    - name: Upload MSI Installer
      uses: actions/upload-artifact@v4
      with:
        name: excel-splitter-windows-msi
        path: target/release/bundle/msi/*.msi
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          target/release/excel-splitter.exe
          target/release/bundle/msi/*.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: stable
    
    - name: Install Tauri CLI
      run: cargo install tauri-cli
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build Tauri App
      run: cargo tauri build
    
    - name: Upload APP
      uses: actions/upload-artifact@v4
      with:
        name: excel-splitter-macos-app
        path: target/release/bundle/macos/*.app
    
    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: excel-splitter-macos-dmg
        path: target/release/bundle/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.0-dev \
          build-essential \
          curl \
          wget \
          libssl-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev
    
    - name: Setup Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: stable
    
    - name: Install Tauri CLI
      run: cargo install tauri-cli
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build Tauri App
      run: cargo tauri build
    
    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: excel-splitter-linux-deb
        path: target/release/bundle/deb/*.deb
    
    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: excel-splitter-linux-appimage
        path: target/release/bundle/appimage/*.AppImage
